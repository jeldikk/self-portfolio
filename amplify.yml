version: 1
applications:
  # -- Backend -----
  - backend:
      phases:
        preBuild:
          commands:
            - corepack enable # very important to enable corepack
            - npm ci --include=optional --cache .npm --prefer-offline
        build:
          commands:
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
    frontend:
      phases:
        build:
          commands:
            - echo "No Build step - static hosting of index.html"
      artifacts:
        baseDirectory: .
        files:
          - index.html
      cache:
        paths: []
    appRoot: packages/backend
  # -- Web App ---
  - backend:
      phases:
        build:
          commands:
            - echo "No backend build step"
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - npm rebuild lightningcss
            - npm ci --include=optional --cache .npm --prefer-offline
            - npx ampx generate outputs --branch $AWS_BRANCH --app-id d25vzux9paw0o8
            - echo "Amplify outputs generated"
            - ls -la
        build:
          commands:
            - echo "Building web app with Turbo"
            - npx turbo run build --filter=@ui/webapp
            - echo "Web app build completed"
        postBuild:
          commands:
            - echo "Generating Amplify outputs"
            - npx ampx generate outputs --branch $AWS_BRANCH --app-id d25vzux9paw0o8
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths: [
          "node_modules/**/*",
          "../../node_modules/**/*",
          "../../packages/backend/node_modules/**/*",
          ".next/cache/**/*"
        ]
    appRoot: apps/webapp